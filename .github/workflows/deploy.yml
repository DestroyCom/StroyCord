name: Release pipeline

on:
  push:
    branches:
      - release
  repository_dispatch:
    types: [trigger-release-pipeline]
  workflow_dispatch:

permissions:
  contents: write
  discussions: write
  packages: write

concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  create_tag:
    uses: ./.github/workflows/create_tag.yml
    secrets: inherit
  build:
    needs: create_tag
    uses: ./.github/workflows/build.yml
    secrets: inherit
  release:
    needs: build
    uses: ./.github/workflows/release.yml
    secrets: inherit
