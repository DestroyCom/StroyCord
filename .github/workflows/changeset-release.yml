name: Changeset Release

on:
  push:
    branches: [master]

concurrency:
  group: changeset-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: changesets/action@v1
        with:
          # Opens a "Version Packages" PR when changesets are present.
          # Merging that PR bumps package.json + CHANGELOG and removes the changeset files.
          # No npm publish — this is a private bot.
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
