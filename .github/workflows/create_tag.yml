name: Create tag

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0

      - name: Derive tag from commit message
        id: tag
        run: |
          MESSAGE=$(git log -1 --pretty=format:'%s')
          TAG=$(echo "$MESSAGE" | sed -e 's/[^a-zA-Z0-9.-]/-/g')
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.tag.outputs.value }}" -m "${{ steps.tag.outputs.value }}"
          git push -f origin "${{ steps.tag.outputs.value }}"
