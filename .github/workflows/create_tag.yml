name: Create tag

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Derive tag from package.json version
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "value=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Tags are intentionally force-pushed so re-running the pipeline on the same version updates the tag pointer.
          git tag -f "${{ steps.tag.outputs.value }}" -m "${{ steps.tag.outputs.value }}"
          git push -f origin "${{ steps.tag.outputs.value }}"
