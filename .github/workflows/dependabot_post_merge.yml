name: Post-Dependabot merge

on:
  push:
    branches: [master]

permissions:
  contents: read
  actions: write

jobs:
  check_author:
    name: Check commit author
    runs-on: ubuntu-latest
    outputs:
      is_dependabot: ${{ steps.check.outputs.is_dependabot }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if commit is from Dependabot
        id: check
        run: |
          AUTHOR=$(git log -1 --pretty=format:'%an')
          if [[ "$AUTHOR" == "dependabot[bot]" ]]; then
            echo "is_dependabot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dependabot=false" >> "$GITHUB_OUTPUT"
          fi

  trigger_release:
    needs: check_author
    if: needs.check_author.outputs.is_dependabot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger release pipeline
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-release-pipeline
