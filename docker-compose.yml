services:
  stroycord:
    container_name: stroycord
    image: destcom/stroycord:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      PREFIX: ${PREFIX:-&}
      LANGUAGE: ${LANGUAGE:-en-US}
      DATABASE_CONNECTION_STRING: ${DATABASE_CONNECTION_STRING:-mongodb://mongodb:27017}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME:-stroycord}
      YOUTUBE_COOKIES_PATH: ${YOUTUBE_COOKIES_PATH:-}
    volumes:
      - ${YOUTUBE_COOKIES_PATH_HOST:-/dev/null}:/app/cookies.txt:ro
    restart: on-failure
    networks:
      - stroycord-network
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    container_name: mongodb
    image: mongo:8
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-root}
    ports:
      - ${MONGO_PORT:-27017}:27017
    volumes:
      - mongo-data:/data/db
    networks:
      - stroycord-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    container_name: mongo-express
    image: mongo-express:1
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_SERVER: ${MONGO_HOST:-mongodb}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: ${MONGOEXPRESS_ENABLE_ADMIN:-true}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-root}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGOEXPRESS_BASIC_AUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGOEXPRESS_BASIC_AUTH_PASSWORD:-admin123}
    ports:
      - 8081:8081
    networks:
      - stroycord-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  stroycord-network:
    name: stroycord-network

volumes:
  mongo-data:
